name: Flutter CD

on:
  push:
    # Only triggers in v1.0.0 format
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  # This is required to create a GitHub Release; otherwise, you'll get a 403 error.
  contents: write

concurrency:
  group: flutter-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Keep it consistent with ci.yml
          flutter-version: '3.41.9'
          channel: stable
          cache: true
      - name: Show Flutter & Dart version
        run: flutter --version
      - name: Install dependencies
        run: flutter pub get
      - name: Check Dart format
        run: dart format --output=none --set-exit-if-changed lib test pigeons
      - name: Static analysis
        run: flutter analyze
      - name: Run tests
        run: flutter test
      - name: Build release APK
        run: flutter build apk --release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 版本 ${{ github.ref_name }}
            ### 安裝方式
            1. 下載 `app-release.apk`
            2. 手機開啟「允許安裝未知來源應用程式」
            3. 安裝並執行

            ### 更新內容
            請參考 CHANGELOG.md
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}